name: windows-build

on:
  push:
    branches: [main]
    paths:
      - "windows/**"
      - ".github/workflows/windows.yml"
    tags:
      - "win-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish
        run: >
          dotnet publish windows/LocalWillow.csproj
          -c Release -r win-x64 --self-contained
          -p:PublishSingleFile=true
          -o stage

      - name: Stage portable zip
        id: zip
        shell: pwsh
        run: |
          # Zip name carries the version: the win-v* tag on releases, dev-<sha> otherwise.
          $version = 'dev-' + '${{ github.sha }}'.Substring(0, 7)
          if ('${{ github.ref_type }}' -eq 'tag') { $version = '${{ github.ref_name }}' }
          $zip = "LocalWillow-windows-x64-$version.zip"
          Copy-Item windows/setup.ps1 stage/
          Copy-Item windows/README.md stage/
          Compress-Archive -Path stage/* -DestinationPath $zip
          "name=$zip" >> $env:GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.zip.outputs.name }}
          path: ${{ steps.zip.outputs.name }}

      - name: Release (on win-v* tag)
        if: startsWith(github.ref, 'refs/tags/win-v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.zip.outputs.name }}
          generate_release_notes: true
